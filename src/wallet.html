<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Wallet - OGSMS
  </title>

  <!-- TAILWIND -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FLUTTERWAVE -->

  <script src="https://checkout.flutterwave.com/v3.js"></script>

  <!-- FONT -->

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>

    body{

      font-family: 'Poppins', sans-serif;

    }

  </style>

</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->

  <nav
    class="bg-[#0B4F63] px-8 py-5 sticky top-0 z-50 flex justify-between items-center"
  >

    <h1
      class="text-white text-2xl font-bold"
    >
      OGSMS
    </h1>

    <a
      href="dashboard.html"
      class="text-white font-medium"
    >
      Dashboard
    </a>

  </nav>

  <!-- MAIN -->

  <main
    class="max-w-5xl mx-auto px-6 py-10"
  >

    <!-- WALLET CARD -->

    <div
      class="bg-white p-10 rounded-3xl shadow-lg"
    >

      <h2
        class="text-4xl font-bold text-gray-800"
      >
        Wallet
      </h2>

      <p
        class="text-gray-500 mt-3"
      >
        Fund your wallet securely.
      </p>

      <!-- BALANCE -->

      <div
        class="bg-[#0B4F63] mt-10 rounded-3xl p-8 text-white"
      >

        <p
          class="text-lg"
        >
          Wallet Balance
        </p>

        <h1
          id="walletBalance"
          class="text-5xl font-bold mt-4"
        >
          ₦0
        </h1>

      </div>

      <!-- FUND SECTION -->

      <div
        class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8"
      >

        <!-- INPUT -->

        <div>

          <label
            class="font-semibold text-gray-700"
          >
            Amount
          </label>

          <input
            id="amount"
            type="number"
            placeholder="Enter amount"
            class="w-full mt-3 px-5 py-4 rounded-2xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#0B4F63]"
          />

        </div>

        <!-- QUICK AMOUNTS -->

        <div>

          <label
            class="font-semibold text-gray-700"
          >
            Quick Amount
          </label>

          <div
            class="grid grid-cols-2 gap-4 mt-3"
          >

            <button
              onclick="setAmount(1000)"
              class="bg-gray-200 hover:bg-gray-300 py-4 rounded-2xl font-semibold"
            >
              ₦1,000
            </button>

            <button
              onclick="setAmount(5000)"
              class="bg-gray-200 hover:bg-gray-300 py-4 rounded-2xl font-semibold"
            >
              ₦5,000
            </button>

            <button
              onclick="setAmount(10000)"
              class="bg-gray-200 hover:bg-gray-300 py-4 rounded-2xl font-semibold"
            >
              ₦10,000
            </button>

            <button
              onclick="setAmount(20000)"
              class="bg-gray-200 hover:bg-gray-300 py-4 rounded-2xl font-semibold"
            >
              ₦20,000
            </button>

          </div>

        </div>

      </div>

      <!-- BUTTON -->

      <button

        onclick="makePayment()"

        class="w-full mt-10 bg-orange-500 hover:bg-[#E89A72] text-white py-5 rounded-2xl font-bold text-lg transition duration-300"

      >

        Fund Wallet

      </button>

    </div>

  </main>

  <script>
    const API_URL = "https://ogsms-3.onrender.com";

    // LOAD USER

    const currentUser =
    JSON.parse(
      localStorage.getItem(
        "currentUser"
      )
    );

    // LOAD BALANCE

    if(currentUser){

      document.getElementById(
        "walletBalance"
      ).innerText =

      "₦" +

      Number(
        currentUser.balance || 0
      ).toLocaleString();

    }

    // QUICK AMOUNT

    function setAmount(amount){

      document.getElementById(
        "amount"
      ).value = amount;

    }

    // PAYMENT

    function makePayment(){

      const amount =
      document.getElementById(
        "amount"
      ).value;

      if(amount === ""){

        alert(
          "Enter amount"
        );

        return;

      }

      FlutterwaveCheckout({

        public_key:
        "FLWPUBK-ab46a67dfb1a6016ae7159462676aee7-X",

        tx_ref:
        "OGSMS-" + Date.now(),

        amount:
        amount,

        currency:
        "NGN",

        payment_options:
        "card,banktransfer,ussd",

        customer: {

          email:
          currentUser.email,

          name:
          currentUser.fullName

        },

        customizations: {

          title:
          "OGSMS Wallet Funding",

          description:
          "Wallet Deposit",

          logo:
          "https://flutterwave.com/images/logo-colored.svg"

        },

        callback: async function(response){

          
          try{

            const update =
           await fetch(
  `${API_URL}/update-wallet`,

              {

                method: "POST",

                headers: {

                  "Content-Type":
                  "application/json"

                },

                body: JSON.stringify({

                  email:
                  currentUser.email,

                  amount:
                  amount

                })

              }

            );

            const data = await update.json();



            if(data.success){

              currentUser.balance =
              data.balance;

              localStorage.setItem(

                "currentUser",

                JSON.stringify(
                  currentUser
                )

              );

              alert(
                "Wallet Funded Successfully"
              );

              location.reload();

            }

          }

          catch(error){

            console.log(error);

            alert(
              "Server Error"
            );

          }

        },

        onclose: function(){

          console.log(
            "Payment Closed"
          );

        }

      });

    }

  </script>

</body>

</html>
