<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OGSMS Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
font-family:Poppins,sans-serif;
}

body{
background:#f8fafc;
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center px-5">

<div class="w-full max-w-md">

<div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

<!-- TOP -->

<div class="bg-[#0B4F63] px-8 py-10 text-center">

<div class="w-20 h-20 bg-orange-500 rounded-full flex items-center justify-center mx-auto shadow-lg">

<span class="text-white text-4xl font-bold">

O

</span>

</div>

<h1 class="text-white text-3xl font-bold mt-6">

OGSMS

</h1>

<p class="text-gray-200 mt-2">

Administrator Login

</p>

</div>

<!-- FORM -->

<div class="p-8">

<div class="mb-5">

<label class="block text-[#0B4F63] font-semibold mb-2">

Username

</label>

<input

id="username"

type="text"

placeholder="Enter Username"

class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-orange-500 transition">

</div>

<div>

<label class="block text-[#0B4F63] font-semibold mb-2">

Password

</label>

<input

id="password"

type="password"

placeholder="Enter Password"

class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 outline-none focus:border-orange-500 transition">

</div>

<button

onclick="adminLogin()"

class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl mt-8 transition">

Login

</button>

<p class="text-center text-gray-500 text-sm mt-6">

OGSMS Administration Panel

</p>

</div>

</div>

</div>

<script src="admin-login.js"></script>

</body>

</html>
