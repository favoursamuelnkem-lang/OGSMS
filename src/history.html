<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Purchase History
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->

  <nav
    class="bg-[#0B4F63] px-8 py-5 flex justify-between items-center"
  >

    <h1
      class="text-white text-2xl font-bold"
    >
      OGSMS
    </h1>

    <a
      href="dashboard.html"
      class="text-white"
    >
      Dashboard
    </a>

  </nav>

  <!-- MAIN -->

  <main
    class="max-w-6xl mx-auto p-6"
  >

    <div
      class="bg-white rounded-3xl p-8 shadow-lg"
    >

      <h1
        class="text-4xl font-bold text-[#0B4F63]"
      >
        Purchase History
      </h1>

      <div
        id="historyContainer"
        class="mt-8 space-y-4"
      >

      </div>

    </div>

  </main>

  <script>
    const API_URL = "https://ogsms-3.onrender.com";

    async function loadHistory(){

      const currentUser =
      JSON.parse(
        localStorage.getItem(
          "currentUser"
        )
      );

      if(!currentUser){

        window.location.href =
        "login.html";

        return;

      }

      try{

        const response =
       await fetch(
  `${API_URL}/purchase-history`,
          {

            method: "POST",

            headers: {

              "Content-Type":
              "application/json"

            },

            body: JSON.stringify({

              email:
              currentUser.email

            })

          }

        );

        const data =
        await response.json();

        const container =
        document.getElementById(
          "historyContainer"
        );

        if(data.purchases.length === 0){

          container.innerHTML =

          `

          <p class="text-gray-500">

            No purchases yet

          </p>

          `;

          return;

        }

        data.purchases.forEach((item) => {

          let cancelButton = "";

if(item.status === "pending"){

  cancelButton = `

  <button
  onclick="cancelNumber(
  '${item.orderId}',
  ${item.price}
  )"
  class="mt-3 bg-red-500 text-white px-4 py-2 rounded"
  >
  Cancel Number
  </button>

  `;

}

        let statusHtml = "";

if(item.status === "successful"){
  statusHtml = `
    <p class="text-green-600 font-bold">
      ✅ Successful
    </p>

    ${
      item.smsCode
        ? `<p class="mt-2 text-lg font-bold text-[#0B4F63]">
             SMS Code: ${item.smsCode}
           </p>`
        : ""
    }
  `;
}

else if(item.status === "cancelled"){
  statusHtml = `
    <p class="text-red-600 font-bold">
      Cancelled
    </p>
  `;
}

else{
  statusHtml = `
    <p class="text-orange-500 font-bold">
      Waiting for SMS...
    </p>
  `;
}

          container.innerHTML +=

          `

          <div
            class="border rounded-2xl p-5"
          >

            <h2
              class="text-xl font-bold"
            >

              ${item.number}

            </h2>

            <p
              class="text-gray-500 mt-2"
            >

              Service:
              ${item.service}

            </p>

            <p
              class="text-gray-500"
            >

              Price:
              ₦${item.price}

            </p>

            <p
              class="text-gray-400 text-sm mt-2"
            >

              ${new Date(
                item.createdAt
              ).toLocaleString()}

            </p>
<div class="mt-3">
  ${statusHtml}
</div>

<div id="sms-${item.orderId}" class="mt-2"></div>
${cancelButton}

          </div>

          `;

         checkSMS(item.orderId);

if(item.status === "pending"){

    setInterval(() => {
        checkSMS(item.orderId);
    }, 5000);

}

});

        

      }

      catch(error){

        console.log(error);

      }

    }

   loadHistory();


async function checkSMS(orderId){

  try{

    const response =
    await fetch(
  `${API_URL}/get-sms`,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          orderId
        })
      }
    );

    const data =
    await response.json();

    const smsBox =
    document.getElementById(
      `sms-${orderId}`
    );

    async function checkSMS(orderId){

  try{

    const response = await fetch(`${API_URL}/get-sms`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ orderId })
    });

    const data = await response.json();

    const smsBox = document.getElementById(`sms-${orderId}`);

    if (data.success && data.sms) {

    smsBox.innerHTML = `Code: ${data.sms}`;
    smsBox.className = "mt-3 text-green-600 font-bold";

    setTimeout(() => {
        location.reload();
    }, 1000);

} else {

    smsBox.innerHTML = "";

}

  }catch(error){

    console.log(error);

  }

}

  }

  catch(error){

    console.log(error);

  }

}




async function cancelNumber(orderId, price){

  const currentUser =
  JSON.parse(
    localStorage.getItem(
      "currentUser"
    )
  );

  try{

    const response =
    await fetch(
  `${API_URL}/cancel-number`,
      {

        method:"POST",

        headers:{
          "Content-Type":
          "application/json"
        },

        body: JSON.stringify({

          email:
          currentUser.email,

          orderId:
          orderId,

          price:
          price

        })

      }

    );

    const data =
    await response.json();

    if(data.success){

      alert("Refund Successful");

      loadHistory();

    }

    else{

      alert(data.message);

    }

  }

  catch(error){

    console.log(error);

  }

}

  </script>


<script>

if (!localStorage.getItem("currentUser")) {

    window.location.href = "login.html";

}

</script>

  <!-- JAVASCRIPT -->
  <script src="js/app.js"></script>


</body>

</html>
