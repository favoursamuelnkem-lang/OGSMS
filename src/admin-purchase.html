<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Purchased Numbers</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{

font-family:Poppins,sans-serif;

}

body{

background:#f8fafc;

}

</style>

</head>

<body>

<div class="p-6 lg:p-10">

<!-- HEADER -->

<div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">

<div>

<h1 class="text-3xl font-bold text-[#0B4F63]">

Purchased Numbers

</h1>

<p class="text-gray-500 mt-2">

Manage all purchased activation numbers

</p>

</div>

<div class="flex flex-col sm:flex-row gap-3">

<input

type="text"

placeholder="Search Email / Number"

class="border rounded-xl px-5 py-3 outline-none w-full sm:w-72">

<select

class="border rounded-xl px-5 py-3 outline-none">

<option>All Services</option>

<option>WhatsApp</option>

<option>Telegram</option>

<option>Facebook</option>

<option>Instagram</option>

<option>Gmail</option>

</select>

</div>

</div>

<!-- TABLE -->

<div class="bg-white rounded-2xl shadow mt-8 overflow-hidden">

<div class="hidden lg:block overflow-x-auto">

<table class="w-full">

<thead class="bg-gray-100">

<tr>

<th class="px-6 py-4 text-left">

Customer

</th>

<th class="px-6 py-4 text-left">

Number

</th>

<th class="px-6 py-4 text-left">

Service

</th>

<th class="px-6 py-4 text-left">

Price

</th>

<th class="px-6 py-4 text-left">

Status

</th>

<th class="px-6 py-4 text-left">

Action

</th>

</tr>

</thead>

<tbody id="purchaseTable">

<tr class="border-t">

<td class="px-6 py-5">

No Purchases

</td>

<td class="px-6 py-5">

-

</td>

<td class="px-6 py-5">

-

</td>

<td class="px-6 py-5">

₦0

</td>

<td class="px-6 py-5">

<span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-sm">

Empty

</span>

</td>

<td class="px-6 py-5">

<div class="flex gap-2">

<button class="bg-[#0B4F63] text-white px-4 py-2 rounded-lg">

View

</button>

<button class="bg-red-500 text-white px-4 py-2 rounded-lg">

Cancel

</button>

</div>

</td>

</tr>

</tbody>

</table>

</div>

<!-- MOBILE -->

<div id="mobilePurchases" class="lg:hidden p-4 space-y-4">

<div class="border rounded-2xl p-5">

<div class="flex justify-between">

<h2 class="font-bold text-[#0B4F63]">

No Purchases

</h2>

<span class="bg-gray-100 px-3 py-1 rounded-full text-xs">

Empty

</span>

</div>

<p class="mt-3 text-gray-500">

Number: -

</p>

<p class="mt-2">

Service: -

</p>

<p class="mt-2">

Price: ₦0

</p>

<div class="grid grid-cols-2 gap-3 mt-5">

<button class="bg-[#0B4F63] text-white py-3 rounded-xl">

View

</button>

<button class="bg-red-500 text-white py-3 rounded-xl">

Cancel

</button>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
