<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Buy Numbers - OGSMS</title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    body{
      font-family: 'Poppins', sans-serif;
    }

  </style>

</head>

<body class="bg-gray-100">

   <div class="md:hidden flex justify-between sticky top-0 z-50 items-center bg-[#0B4F63] text-white  p-4">
  <h1 class="text-3xl font-bold">OGSMS</h1>

  <button id="menuBtn" class="text-2xl">
    ☰
  </button>
</div>

  <div class="flex flex-col md:flex-row min-h-screen">

    <!-- SIDEBAR -->
    <aside id="sidebar" class=" hidden md:block lg:w-64  bg-[#0B4F63] text-white p-4">

      <!-- LOGO -->
      <h1 class="text-3xl pt-5 font-extrabold hidden md:block">
        OGSMS
      </h1>

      <!-- MENU -->
      <ul class="md:mt-16 mt-1 space-y-6 text-lg">

        <li>
          <a href="dashboard.html" class="block text-orange-300">
            Dashboard
          </a>
        </li>

        <li>
          <a href="wallet.html" class="block hover:text-orange-300 transition">
            Wallet
          </a>
        </li>

        <li>
          <a href="numbers.html" class="block hover:text-orange-300 transition">
            Buy Numbers
          </a>
        </li>

        <li>
          <a href="history.html" class="block hover:text-orange-300 transition">
            Purchase History
          </a>
        </li>

      </ul>

    </aside>

  <!--  -->

    <!-- MAIN -->
    <main class="flex-1 p-5 md:p-10">

      

      <!-- HEADER -->
      <div>

        <h1 class="text-4xl font-extrabold text-gray-800">
          Buy Numbers
        </h1>

        <p class="text-gray-500 mt-2">
          Choose country and service
        </p>

      </div>

      <!-- FILTERS -->
      <div class="bg-white p-8 rounded-3xl shadow-sm mt-10">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

          <!-- COUNTRY -->
          <div>

            <label class="font-semibold text-gray-700">
              Country
            </label>

            <select
    id="country"
    class="w-full mt-3 px-5 py-4 rounded-2xl border border-gray-200 outline-none">

</select>

          </div>

          <!-- SERVICE -->
          <div>

            <label class="font-semibold text-gray-700">
              Service
            </label>

            <select
id="service"
class="w-full mt-3 px-5 py-4 rounded-2xl border border-gray-200 outline-none"
>

<option value="whatsapp">WhatsApp</option>

<option value="telegram">Telegram</option>

<option value="facebook">Facebook</option>


</select>

          </div>

          <!-- PRICE -->
          <div>

            <label class="font-semibold text-gray-700">
              Price
            </label>

            <input
              type="text"
              id="price"
              disabled
              class="w-full mt-3 px-5 py-4 rounded-2xl bg-gray-100 border border-gray-300"
            >

          </div>

        </div>

        <!-- BUTTON -->
        <button

  id="buyBtn"

  class="mt-8 bg-orange-500 hover:bg-[#E89A72] text-white px-8 py-4 rounded-2xl font-bold"

>

  Buy Number

</button>

      </div>

      <!-- AVAILABLE NUMBERS -->
      <div class="mt-12">

        <h2 class="text-3xl font-bold text-gray-800">

          Available Numbers

        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8">

          <!-- CARD -->
          <div class="bg-white p-8 rounded-3xl shadow-sm">

            <div class="flex justify-between items-center">

              <div>

                <h3 class="text-2xl font-bold">
                  🇺🇸 USA
                </h3>

                <p class="text-gray-500 mt-2">
                  +1 202 XXX XXXX
                </p>

              </div>

              <span class="bg-green-100 text-green-600 px-4 py-2 rounded-full text-sm">

                Available

              </span>

            </div>

            <button class=" hidden purchaseBtn mt-8 bg-[#0B4F63] hover:bg-[#083847] text-white px-8 py-3 rounded-2xl font-semibold transition">

              Purchase

            </button>

          </div>

          <!-- CARD -->
          <div class="bg-white p-8 rounded-3xl shadow-sm">

            <div class="flex justify-between items-center">

              <div>

                <h3 class="text-2xl font-bold">
                  🇬🇧 UK
                </h3>

                <p class="text-gray-500 mt-2">
                  +44 740 XXX XXXX
                </p>

              </div>

              <span class="bg-green-100 text-green-600 px-4 py-2 rounded-full text-sm">

                Available

              </span>

            </div>

            <button class=" hidden purchaseBtn mt-8 bg-[#0B4F63] hover:bg-[#083847] text-white px-8 py-3 rounded-2xl font-semibold transition">

              Purchase

            </button>

          </div>

        </div>

      </div>

    </main>

  </div>

  <script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");

menuBtn.addEventListener("click", () => {
  sidebar.classList.toggle("hidden");
});
</script>

  <script src="js/app.js"></script>

</body>

</html>
