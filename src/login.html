<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Login - OGSMS
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">

    <h1 class="text-4xl font-bold text-center text-[#0B4F63]">
      Welcome Back
    </h1>

    <form
      id="loginForm"
      class="mt-10 space-y-6"
    >

      <input

        id="email"

        type="email"

        placeholder="Email Address"

        class="w-full border p-4 rounded-2xl" required

      >

      <input

        id="password"

        type="password"

        placeholder="Password"

        class="w-full border p-4 rounded-2xl" required

      >

      <button

        type="submit"

        class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold"

      >

        Login

      </button>

    </form>

    <p class="text-center mt-6">

      Don’t have an account?

      <a
        href="register.html"
        class="text-orange-500 font-bold"
      >
        Register
      </a>

    </p>

  </div>

  <script src="js/app.js"></script>

</body>

</html>
